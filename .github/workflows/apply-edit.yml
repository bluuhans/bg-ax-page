name: 웹 편집 반영
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency: apply-edit
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 최신 제출 확인·반영
        env:
          CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          PASS: ${{ secrets.EDIT_PASSPHRASE }}
        run: python3 apply_edit.py
      - name: 변경 시 커밋
        run: |
          if ! git diff --quiet; then
            git config user.name "ax-edit-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html .last-sync
            git commit -m "페이지 편집 저장 (구글 폼 중계)"
            git push
          fi
